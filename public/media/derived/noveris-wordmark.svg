<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 118" role="img" aria-labelledby="title desc" text-rendering="geometricPrecision">
  <title id="title">NOVERIS</title>
  <desc id="desc">Crisp temporary vector NOVERIS wordmark.</desc>
  <defs>
    <linearGradient id="silver" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.46" stop-color="#f8faf8"/>
      <stop offset="0.58" stop-color="#aeb6ba"/>
      <stop offset="0.73" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#788087"/>
    </linearGradient>
    <filter id="crisp-shadow" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.18" flood-color="#ffffff" flood-opacity="0.26"/>
      <feDropShadow dx="0" dy="1.5" stdDeviation="0.25" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="1040" height="118" fill="transparent"/>
  <text
    x="520"
    y="78"
    fill="url(#silver)"
    filter="url(#crisp-shadow)"
    font-family="Avenir Next, Helvetica Neue, Arial, sans-serif"
    font-size="72"
    font-weight="500"
    letter-spacing="50"
    text-anchor="middle"
    dominant-baseline="middle"
  >NOVERIS</text>
</svg>
