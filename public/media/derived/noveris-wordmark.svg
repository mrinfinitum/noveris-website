<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 100" role="img" aria-labelledby="title desc" text-rendering="geometricPrecision">
  <title id="title">NOVERIS</title>
  <desc id="desc">Crisp vector NOVERIS wordmark.</desc>
  <defs>
    <linearGradient id="silver" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#f9fbfa"/>
      <stop offset="0.54" stop-color="#b7bdc0"/>
      <stop offset="0.7" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#858b90"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffba75" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="crisp-shadow" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0.65" stdDeviation="0.18" flood-color="#ffffff" flood-opacity="0.32"/>
      <feDropShadow dx="0" dy="1.2" stdDeviation="0.18" flood-color="#020407" flood-opacity="0.62"/>
    </filter>
  </defs>

  <g fill="url(#silver)" filter="url(#crisp-shadow)" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="82" font-stretch="expanded" font-weight="300">
    <text x="8" y="75">N</text>
    <text x="245" y="75">O</text>
    <text x="480" y="75">V</text>
    <text x="930" y="75">R</text>
    <text x="1154" y="75">I</text>
    <text x="1286" y="75">S</text>
  </g>

  <g filter="url(#crisp-shadow)">
    <rect x="732" y="22" width="82" height="7" fill="url(#silver)"/>
    <rect x="754" y="47" width="60" height="7" fill="url(#silver)"/>
    <rect x="732" y="72" width="82" height="7" fill="url(#silver)"/>
    <rect x="746" y="49" width="68" height="2" fill="url(#edge)" opacity="0.95"/>
  </g>
</svg>
